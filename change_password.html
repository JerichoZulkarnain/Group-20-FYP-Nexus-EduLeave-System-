<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="dashboard-page">

<div class="sidebar">
    <img src="images/logo.png" class="sidebar-logo">
    <div class="sidebar-title">EduLeave System</div>
    <div class="sidebar-date" id="dateText"></div>
    <div id="sidebarMenu"></div>
</div>

<div class="dashboard-main">

    <div class="topbar">
        <div class="topbar-name" id="topName"></div>

        <div class="topbar-right">
            <i class="fa-solid fa-bell"></i>
            <span>|</span>

           <a href="login.html" class="logout-link" onclick="logout(event)">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </div>

    <div class="dashboard-content">
        <div class="profile-card">

            <div class="change-password-box">

                <h1>Change Password</h1>

                <label>Old Password</label>
                <div class="change-pass-field">
                    <input type="password" id="oldPassword">
                    <i class="fa-regular fa-eye-slash" onclick="togglePassword('oldPassword', this)"></i>
                </div>

                <label>New Password</label>
                <div class="change-pass-field">
                    <input type="password" id="newPassword" onkeyup="checkPassword()">
                    <i class="fa-regular fa-eye-slash" onclick="togglePassword('newPassword', this)"></i>
                </div>

                <div id="passwordRules">
                    <label>Confirm New Password</label>

<div class="change-pass-field">
    <input type="password" id="confirmPassword">

    <i class="fa-regular fa-eye-slash"
    onclick="togglePassword('confirmPassword', this)"></i>
</div>

<button class="change-password-btn"
onclick="changePassword()">
    Change Password
</button>
                    <p id="lengthRule">• Minimum 12 characters</p>
                    <p id="upperRule">• One uppercase character</p>
                    <p id="lowerRule">• One lowercase character</p>
                    <p id="specialRule">• One special character</p>
                    <p id="numberRule">• One number</p>
                </div>

                <label>Confirm New Password</label>
                <div class="change-pass-field">
                    <input type="password" id="confirmPassword">
                    <i class="fa-regular fa-eye-slash" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <button class="change-password-btn" onclick="changePassword()">
                    Change Password
                </button>

            </div>

        </div>
    </div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){
    window.location.href = "login.html";
}

let roleText = "";
let sidebarHTML = "";
let id = user.nexusId.toUpperCase();

if(id.startsWith("STU")){
    roleText = "Student";

    sidebarHTML = `
        <a href="dashboard_student.html" class="nav-link">
            <i class="fa-solid fa-house nav-fa"></i>Home
        </a>

        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user nav-fa"></i>Profile
        </a>

        <a href="edit_profile.html" class="nav-link">
            <i class="fa-solid fa-pen nav-fa"></i>Edit Profile
        </a>

        <a href="#" class="nav-link">
            <i class="fa-regular fa-file-lines nav-fa"></i>Apply Leave
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-envelope nav-fa"></i>Upload MC
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-chart-simple nav-fa"></i>Leave History
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-location-pin nav-fa"></i>Track Status
        </a>
    `;
}

else if(id.startsWith("LEC")){
    roleText = "Lecturer";

    sidebarHTML = `
        <a href="dashboard_lecturer.html" class="nav-link">
            <i class="fa-solid fa-chart-column nav-fa"></i>Dashboard
        </a>

        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user nav-fa"></i>Profile
        </a>

        <a href="edit_profile.html" class="nav-link">
            <i class="fa-solid fa-pen nav-fa"></i>Edit Profile
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-envelope nav-fa"></i>Pending Applications
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-magnifying-glass nav-fa"></i>Search Students
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-gear nav-fa"></i>Filter Leave
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-location-pin nav-fa"></i>Track Status
        </a>

        <a href="#" class="nav-link">
            <i class="fa-regular fa-square-check nav-fa"></i>Approve Leave
        </a>

        <a href="#" class="nav-link">
            <i class="fa-regular fa-square-xmark nav-fa"></i>Reject Leave
        </a>
    `;
}

else if(id.startsWith("ADM")){
    roleText = "Admin";

    sidebarHTML = `
        <a href="dashboard_admin.html" class="nav-link">
            <i class="fa-solid fa-chart-column nav-fa"></i>Dashboard
        </a>

        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user nav-fa"></i>Profile
        </a>

        <a href="edit_profile.html" class="nav-link">
            <i class="fa-solid fa-pen nav-fa"></i>Edit Profile
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-user-graduate nav-fa"></i>Manage Students
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-user-tie nav-fa"></i>Manage Lecturers
        </a>

        <a href="#" class="nav-link">
            <i class="fa-regular fa-file-lines nav-fa"></i>Reports
        </a>

        <a href="#" class="nav-link">
            <i class="fa-solid fa-chart-simple nav-fa"></i>Absence Summary
        </a>
    `;
}

document.getElementById("sidebarMenu").innerHTML = sidebarHTML;

document.getElementById("topName").innerHTML =
    user.fullName.toUpperCase() + " (" + roleText.toUpperCase() + ")";

document.getElementById("dateText").innerHTML =
    new Date().toLocaleDateString("en-MY", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
    });

function togglePassword(inputId, icon){
    let input = document.getElementById(inputId);

    if(input.type === "password"){
        input.type = "text";
        icon.className = "fa-regular fa-eye";
    }
    else{
        input.type = "password";
        icon.className = "fa-regular fa-eye-slash";
    }
}

function checkPassword(){
    let password = document.getElementById("newPassword").value;

    setRule("lengthRule", password.length >= 12);
    setRule("upperRule", /[A-Z]/.test(password));
    setRule("lowerRule", /[a-z]/.test(password));
    setRule("specialRule", /[^A-Za-z0-9]/.test(password));
    setRule("numberRule", /[0-9]/.test(password));
}

function setRule(ruleId, valid){
    let rule = document.getElementById(ruleId);

    if(valid){
        rule.style.color = "#555";
        rule.style.fontWeight = "400";
    }
    else{
        rule.style.color = "red";
        rule.style.fontWeight = "800";
    }
}

function changePassword(){
    let oldPassword = document.getElementById("oldPassword").value;
    let newPassword = document.getElementById("newPassword").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let validPassword =
        newPassword.length >= 12 &&
        /[A-Z]/.test(newPassword) &&
        /[a-z]/.test(newPassword) &&
        /[^A-Za-z0-9]/.test(newPassword) &&
        /[0-9]/.test(newPassword);

    checkPassword();

    if(oldPassword !== user.password){
        alert("Old password is incorrect.");
        return;
    }

    if(!validPassword){
        alert("Please fulfill all password requirements.");
        return;
    }

    if(newPassword !== confirmPassword){
        alert("Confirm password does not match.");
        return;
    }

    user.password = newPassword;

    localStorage.setItem("loggedInUser", JSON.stringify(user));

    let users = JSON.parse(localStorage.getItem("users")) || [];

    for(let i = 0; i < users.length; i++){
        if(users[i].nexusId === user.nexusId){
            users[i].password = newPassword;
        }
    }

    localStorage.setItem("users", JSON.stringify(users));

    alert("Password changed successfully!");
    window.location.href = "profile.html";
}

function logout(event){

    event.preventDefault();

    localStorage.removeItem("loggedInUser");

    window.location.href = "login.html";
}
</script>

</body>
</html>
